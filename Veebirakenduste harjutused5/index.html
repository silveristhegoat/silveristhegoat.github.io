<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Speak | Sarcastic Corporate Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="status-dot"></div>
            <h1>EXECUTIVE_DIRECTIVE</h1>
            <p class="subtitle">Mission-critical sarcasm for the modern workplace.</p>
        </header>

        <main>
            <div id="phrase-container" class="phrase-box">
                <span class="quote-mark">"</span>
                <p id="phrase-text">Click below to align our synergies.</p>
                <span class="quote-mark bottom">"</span>
            </div>

            <div class="button-group">
                <button id="generate-btn" class="primary-btn">CIRCLE BACK</button>
                <button id="copy-btn" class="secondary-btn" title="Copy to Clipboard">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
            </div>
        </main>

        <footer>
            <p>© 2026 Synergetic Solutions Inc. // All rights leveraged.</p>
        </footer>
    </div>
    <div id="toast" class="toast hidden">Copied to clipboard</div>
    <script src="script.js"></script>
</body>
</html>
