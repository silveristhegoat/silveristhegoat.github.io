<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgetly | Minimal Budget Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="controls">
            <button id="theme-toggle" class="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
            <h2>Budgetly</h2>
            
            <div class="input-group">
                <label for="income">Monthly Income</label>
                <input type="number" id="income" placeholder="e.g. 3000" min="0">
            </div>

            <div class="expense-form">
                <h3>Add Expense</h3>
                <div class="input-group">
                    <label for="expense-name">Name</label>
                    <input type="text" id="expense-name" placeholder="Rent, Food, etc.">
                </div>
                <div class="input-group">
                    <label for="expense-amount">Amount</label>
                    <input type="number" id="expense-amount" placeholder="0" min="0">
                </div>
                <button id="add-expense-btn">Add Expense</button>
            </div>

            <div class="expense-list-container">
                <h3>Transactions</h3>
                <ul id="expense-list"></ul>
            </div>
        </aside>

        <main class="dashboard">
            <div class="summary-cards">
                <div class="card">
                    <span>Total Expenses</span>
                    <h2 id="total-expenses">$0</h2>
                </div>
                <div class="card">
                    <span>Balance</span>
                    <h2 id="remaining-balance">$0</h2>
                </div>
            </div>

            <div id="warning-banner" class="warning hidden">
                ⚠️ Careful! You're spending more than you earn.
            </div>

            <div class="chart-container">
                <canvas id="budgetChart" width="400" height="400"></canvas>
                <div id="chart-legend" class="legend"></div>
            </div>
        </main>
    </div>
    <div id="tooltip" class="tooltip hidden"></div>
    <script src="script.js"></script>
</body>
</html>
