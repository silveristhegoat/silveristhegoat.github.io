<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graafika 19 - Key-Sound Piano</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    :root {
      --bg-1: #061224;
      --bg-2: #0f2d3b;
      --bg-3: #173951;
      --ink: #e4f4ff;
      --muted: #9ec0cf;
      --accent: #ffe9a8;
      --card: rgba(9, 20, 35, 0.55);
      --card-border: rgba(185, 230, 252, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 0%, #274f67 0%, transparent 35%),
        radial-gradient(circle at 90% 85%, #0d5563 0%, transparent 45%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
    }

    .wrap {
      max-width: min(62rem, calc(100vw - 2rem));
      margin: 1.25rem auto 2rem;
      display: grid;
      gap: 1rem;
    }

    .panel {
      border: 1px solid var(--card-border);
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 0.8rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      padding: 0.9rem 1rem;
    }

    .title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .subtitle {
      margin: 0.35rem 0 0;
      font-size: 0.92rem;
      line-height: 1.45;
      color: var(--muted);
      font-weight: 500;
    }

    .input-zone {
      display: grid;
      gap: 0.7rem;
    }

    #typing-box {
      width: 100%;
      min-height: 8.5rem;
      resize: vertical;
      border-radius: 0.7rem;
      border: 1px solid rgba(199, 236, 254, 0.25);
      background: rgba(8, 19, 34, 0.75);
      color: var(--ink);
      font: inherit;
      font-size: 1rem;
      line-height: 1.45;
      padding: 0.8rem 0.9rem;
      outline: none;
    }

    #typing-box:focus {
      border-color: rgba(255, 233, 168, 0.58);
      box-shadow: 0 0 0 2px rgba(255, 233, 168, 0.16);
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      align-items: center;
      justify-content: space-between;
      font-size: 0.87rem;
      color: var(--muted);
    }

    .pill {
      border: 1px solid rgba(199, 236, 254, 0.25);
      border-radius: 999px;
      padding: 0.35rem 0.65rem;
      background: rgba(12, 30, 52, 0.6);
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 0.45rem;
    }

    .key {
      border: 1px solid rgba(199, 236, 254, 0.25);
      border-radius: 0.55rem;
      background: rgba(17, 38, 66, 0.74);
      color: var(--ink);
      padding: 0.5rem 0.2rem;
      text-align: center;
      font-size: 0.76rem;
      user-select: none;
      transition: transform 90ms ease, background 90ms ease, border-color 90ms ease;
    }

    .key.active {
      transform: translateY(-2px) scale(1.03);
      background: rgba(53, 87, 132, 0.78);
      border-color: rgba(255, 233, 168, 0.78);
    }

    @media (max-width: 700px) {
      .keyboard {
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      #typing-box {
        min-height: 7rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1 class="title">Key-Sound Piano</h1>
      <p class="subtitle">Type anything. Every keystroke triggers a random short sound, from retro bit blips to cartoon-like "piu" tones.</p>
    </section>

    <section class="panel input-zone">
      <textarea id="typing-box" spellcheck="false" placeholder="Start typing to play random sounds..."></textarea>
      <div class="status">
        <span class="pill" id="sound-mode">Last Sound: none</span>
        <span class="pill" id="key-count">Keystrokes: 0</span>
      </div>
    </section>

    <section class="panel">
      <div class="keyboard" id="keyboard"></div>
    </section>
  </main>

  <script>
    const typingBox = document.getElementById('typing-box');
    const soundMode = document.getElementById('sound-mode');
    const keyCountEl = document.getElementById('key-count');
    const keyboard = document.getElementById('keyboard');

    const displayKeys = '1234567890QWERTYUIOPASDFGHJKLZXCVBNM,.;!?@#'.split('');
    let keystrokes = 0;
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function envelope(gainNode, start, peak, length) {
      gainNode.gain.setValueAtTime(0.0001, start);
      gainNode.gain.exponentialRampToValueAtTime(peak, start + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, start + length);
    }

    function soundBit(ctx, now) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = pick(['square', 'triangle']);
      const base = pick([280, 330, 390, 440, 520, 660]);
      osc.frequency.setValueAtTime(base, now);
      osc.frequency.exponentialRampToValueAtTime(base * random(1.15, 1.45), now + 0.05);
      envelope(gain, now, 0.08, 0.12);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.14);
      return 'Bit Blip';
    }

    function soundPiu(ctx, now) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      const startF = random(700, 950);
      osc.frequency.setValueAtTime(startF, now);
      osc.frequency.exponentialRampToValueAtTime(startF * random(1.5, 1.9), now + 0.06);
      osc.frequency.exponentialRampToValueAtTime(startF * random(0.85, 1.05), now + 0.16);
      envelope(gain, now, 0.075, 0.2);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.22);
      return 'Cartoon Piu';
    }

    function soundZap(ctx, now) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      osc.type = 'sawtooth';
      const f = random(180, 340);
      osc.frequency.setValueAtTime(f, now);
      osc.frequency.exponentialRampToValueAtTime(f * random(2.2, 3.1), now + 0.07);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1800, now);
      filter.Q.value = 1.3;
      envelope(gain, now, 0.055, 0.11);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.13);
      return 'Zap Chirp';
    }

    function soundPluck(ctx, now) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      const base = random(220, 520);
      osc.frequency.setValueAtTime(base, now);
      osc.frequency.exponentialRampToValueAtTime(base * 0.62, now + 0.12);
      envelope(gain, now, 0.06, 0.14);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.16);
      return 'Soft Pluck';
    }

    function soundBubble(ctx, now) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      const start = random(180, 260);
      osc.frequency.setValueAtTime(start, now);
      osc.frequency.exponentialRampToValueAtTime(start * random(1.7, 2.2), now + 0.05);
      osc.frequency.exponentialRampToValueAtTime(start * random(0.92, 1.08), now + 0.12);
      envelope(gain, now, 0.065, 0.16);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.18);
      return 'Bubble Pop';
    }

    function soundLaser(ctx, now) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      const start = random(560, 860);
      osc.frequency.setValueAtTime(start, now);
      osc.frequency.exponentialRampToValueAtTime(start * random(0.28, 0.42), now + 0.11);
      envelope(gain, now, 0.05, 0.12);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.13);
      return 'Mini Laser';
    }

    function soundClickPop(ctx, now) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      osc.type = 'square';
      const base = random(340, 680);
      osc.frequency.setValueAtTime(base, now);
      osc.frequency.exponentialRampToValueAtTime(base * random(1.08, 1.22), now + 0.03);
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(random(1200, 2200), now);
      filter.Q.value = 2.4;
      envelope(gain, now, 0.045, 0.09);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.11);
      return 'Click Pop';
    }

    const synths = [
      soundBit,
      soundPiu,
      soundZap,
      soundPluck,
      soundBubble,
      soundLaser,
      soundClickPop
    ];

    function playRandomSound() {
      const ctx = ensureAudio();
      const now = ctx.currentTime;
      const synth = pick(synths);
      const label = synth(ctx, now);
      soundMode.textContent = `Last Sound: ${label}`;
    }

    function pulseKey(char) {
      const item = keyboard.querySelector(`[data-key="${CSS.escape(char.toUpperCase())}"]`);
      if (!item) {
        return;
      }
      item.classList.add('active');
      setTimeout(() => item.classList.remove('active'), 110);
    }

    displayKeys.forEach(k => {
      const div = document.createElement('div');
      div.className = 'key';
      div.dataset.key = k;
      div.textContent = k;
      keyboard.appendChild(div);
    });

    typingBox.addEventListener('keydown', (event) => {
      if (event.key === 'Shift' || event.key === 'Control' || event.key === 'Alt' || event.key === 'Meta') {
        return;
      }

      playRandomSound();
      keystrokes += 1;
      keyCountEl.textContent = `Keystrokes: ${keystrokes}`;

      if (event.key.length === 1) {
        pulseKey(event.key);
      } else if (event.key === 'Backspace') {
        pulseKey('?');
      }
    });

    // Unlock audio early on first interaction for browser autoplay policies.
    window.addEventListener('pointerdown', ensureAudio, { once: true });
  </script>
</body>
</html>
