<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graafika 20 - Screen Edge Warp</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    :root {
      --bg-1: #061224;
      --bg-2: #0f2d3b;
      --bg-3: #173951;
      --ink: #e4f4ff;
      --muted: #9ec0cf;
      --accent: #ffe9a8;
      --card: rgba(9, 20, 35, 0.55);
      --card-border: rgba(185, 230, 252, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 0%, #274f67 0%, transparent 35%),
        radial-gradient(circle at 90% 85%, #0d5563 0%, transparent 45%),
        linear-gradient(130deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
    }

    .panel {
      position: fixed;
      left: 1rem;
      top: 1rem;
      max-width: min(38rem, calc(100vw - 2rem));
      padding: 0.9rem 1rem;
      border: 1px solid var(--card-border);
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 0.8rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      z-index: 20;
    }

    .title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .subtitle {
      margin: 0.35rem 0 0;
      font-size: 0.92rem;
      line-height: 1.4;
      color: var(--muted);
      font-weight: 500;
    }

    #stage {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    .warp-object {
      position: absolute;
      width: 108px;
      height: 108px;
      border-radius: 0.9rem;
      border: 1px solid rgba(185, 230, 252, 0.42);
      display: grid;
      place-items: center;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      user-select: none;
      touch-action: none;
      cursor: grab;
      transition: box-shadow 120ms ease;
    }

    .warp-object.dragging {
      cursor: grabbing;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .o1 { left: 14%; top: 33%; background: linear-gradient(145deg, rgba(66, 153, 225, 0.82), rgba(49, 130, 206, 0.9)); }
    .o2 { left: 35%; top: 55%; background: linear-gradient(145deg, rgba(236, 100, 166, 0.82), rgba(219, 39, 119, 0.9)); }
    .o3 { left: 58%; top: 26%; background: linear-gradient(145deg, rgba(96, 165, 250, 0.82), rgba(59, 130, 246, 0.9)); }
    .o4 { left: 76%; top: 60%; background: linear-gradient(145deg, rgba(251, 146, 60, 0.82), rgba(234, 88, 12, 0.9)); }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 1rem;
      transform: translateX(-50%);
      border: 1px solid var(--card-border);
      background: rgba(8, 19, 34, 0.64);
      border-radius: 999px;
      padding: 0.5rem 0.85rem;
      font-size: 0.82rem;
      color: var(--muted);
      z-index: 20;
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      .warp-object {
        width: 84px;
        height: 84px;
        font-size: 0.72rem;
      }

      .panel {
        max-width: calc(100vw - 1rem);
        left: 0.5rem;
        top: 0.5rem;
      }

      .hint {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <section class="panel">
    <h1 class="title">Screen Edge Warp</h1>
    <p class="subtitle">Drag any object beyond a screen edge and it reappears from the opposite side, like Pac-Man.</p>
  </section>

  <div id="stage">
    <div class="warp-object o1">Warp A</div>
    <div class="warp-object o2">Warp B</div>
    <div class="warp-object o3">Warp C</div>
    <div class="warp-object o4">Warp D</div>
  </div>

  <div class="hint">Drag objects through edges to wrap around.</div>

  <script>
    const objects = Array.from(document.querySelectorAll('.warp-object'));
    const activeDrags = new Map();
    let topZ = 2;

    function wrapObject(obj) {
      const stageW = window.innerWidth;
      const stageH = window.innerHeight;
      const w = obj.offsetWidth;
      const h = obj.offsetHeight;

      let x = parseFloat(obj.style.left);
      let y = parseFloat(obj.style.top);

      if (Number.isNaN(x) || Number.isNaN(y)) {
        const rect = obj.getBoundingClientRect();
        x = rect.left;
        y = rect.top;
      }

      // Warp when the object's center crosses an edge (more reliable while dragging).
      const centerX = x + w / 2;
      const centerY = y + h / 2;

      if (centerX > stageW) {
        x = -w / 2;
      } else if (centerX < 0) {
        x = stageW - w / 2;
      }

      if (centerY > stageH) {
        y = -h / 2;
      } else if (centerY < 0) {
        y = stageH - h / 2;
      }

      obj.style.left = `${x}px`;
      obj.style.top = `${y}px`;
    }

    objects.forEach((obj) => {
      // Convert initial percentage positioning to pixel coordinates for smooth dragging.
      const rect = obj.getBoundingClientRect();
      obj.style.left = `${rect.left}px`;
      obj.style.top = `${rect.top}px`;

      obj.addEventListener('pointerdown', (e) => {
        topZ += 1;
        obj.style.zIndex = String(topZ);
        obj.classList.add('dragging');

        const r = obj.getBoundingClientRect();
        const offsetX = e.clientX - r.left;
        const offsetY = e.clientY - r.top;

        activeDrags.set(e.pointerId, { obj, offsetX, offsetY });
        obj.setPointerCapture(e.pointerId);
      });

      obj.addEventListener('pointermove', (e) => {
        const drag = activeDrags.get(e.pointerId);
        if (!drag || drag.obj !== obj) {
          return;
        }

        const x = e.clientX - drag.offsetX;
        const y = e.clientY - drag.offsetY;
        obj.style.left = `${x}px`;
        obj.style.top = `${y}px`;

        wrapObject(obj);
      });

      function release(pointerId) {
        if (activeDrags.has(pointerId)) {
          activeDrags.delete(pointerId);
          obj.classList.remove('dragging');
        }
      }

      obj.addEventListener('pointerup', (e) => release(e.pointerId));
      obj.addEventListener('pointercancel', (e) => release(e.pointerId));
    });

    window.addEventListener('resize', () => {
      objects.forEach(wrapObject);
    });
  </script>
</body>
</html>
