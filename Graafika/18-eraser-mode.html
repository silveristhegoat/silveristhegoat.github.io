<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graafika 18 - Eraser Mode</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    :root {
      --bg-1: #061224;
      --bg-2: #0f2d3b;
      --bg-3: #173951;
      --ink: #e4f4ff;
      --muted: #9ec0cf;
      --accent: #ffe9a8;
      --card: rgba(9, 20, 35, 0.55);
      --card-border: rgba(185, 230, 252, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--ink);
    }

    #background {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&h=1080&fit=crop') center/cover;
      z-index: 1;
    }

    .panel {
      position: fixed;
      left: 1rem;
      top: 1rem;
      max-width: min(34rem, calc(100vw - 2rem));
      padding: 0.9rem 1rem;
      border: 1px solid var(--card-border);
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 0.8rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      z-index: 1000;
    }

    .title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .subtitle {
      margin: 0.35rem 0 0;
      font-size: 0.92rem;
      line-height: 1.4;
      color: var(--muted);
      font-weight: 500;
    }

    .controls {
      position: fixed;
      right: 1rem;
      top: 1rem;
      display: flex;
      gap: 0.6rem;
      z-index: 1000;
    }

    .btn {
      padding: 0.65rem 1rem;
      border: 1px solid var(--card-border);
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 0.7rem;
      color: var(--ink);
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 120ms ease;
    }

    .btn:hover {
      background: rgba(39, 66, 105, 0.72);
      border-color: rgba(255, 233, 168, 0.58);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 0;
    }

    .tile {
      position: relative;
      transition: opacity 600ms ease-out;
      cursor: crosshair;
    }

    .tile.erased {
      opacity: 0;
      pointer-events: none;
    }

    .tile:nth-child(8n + 1) { background: linear-gradient(135deg, rgba(59, 130, 246, 0.85), rgba(37, 99, 235, 0.92)); }
    .tile:nth-child(8n + 2) { background: linear-gradient(135deg, rgba(139, 92, 246, 0.85), rgba(124, 58, 237, 0.92)); }
    .tile:nth-child(8n + 3) { background: linear-gradient(135deg, rgba(236, 72, 153, 0.85), rgba(219, 39, 119, 0.92)); }
    .tile:nth-child(8n + 4) { background: linear-gradient(135deg, rgba(251, 146, 60, 0.85), rgba(249, 115, 22, 0.92)); }
    .tile:nth-child(8n + 5) { background: linear-gradient(135deg, rgba(34, 197, 94, 0.85), rgba(22, 163, 74, 0.92)); }
    .tile:nth-child(8n + 6) { background: linear-gradient(135deg, rgba(14, 165, 233, 0.85), rgba(2, 132, 199, 0.92)); }
    .tile:nth-child(8n + 7) { background: linear-gradient(135deg, rgba(168, 85, 247, 0.85), rgba(147, 51, 234, 0.92)); }
    .tile:nth-child(8n + 8) { background: linear-gradient(135deg, rgba(244, 63, 94, 0.85), rgba(225, 29, 72, 0.92)); }

    @media (max-width: 900px) {
      #overlay {
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(8, 1fr);
      }

      .controls {
        left: 1rem;
        right: auto;
        top: auto;
        bottom: 1rem;
        flex-direction: column;
      }

      .panel {
        max-width: calc(100vw - 2rem);
      }
    }

    @media (max-width: 600px) {
      #overlay {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(6, 1fr);
      }
    }
  </style>
</head>
<body>
  <div id="background"></div>

  <section class="panel" aria-live="polite">
    <h1 class="title">Eraser Mode</h1>
    <p class="subtitle">Move your cursor over the colored tiles to erase them and reveal the background.</p>
  </section>

  <div class="controls">
    <button class="btn" id="reset-btn">Reset All</button>
  </div>

  <div id="overlay"></div>

  <script>
    const overlay = document.getElementById('overlay');
    const resetBtn = document.getElementById('reset-btn');

    // Calculate number of tiles based on grid
    const cols = window.innerWidth <= 600 ? 4 : window.innerWidth <= 900 ? 6 : 8;
    const rows = window.innerWidth <= 600 ? 6 : window.innerWidth <= 900 ? 8 : 6;
    const totalTiles = cols * rows;

    // Create tiles
    for (let i = 0; i < totalTiles; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      overlay.appendChild(tile);
    }

    const tiles = document.querySelectorAll('.tile');

    // Erase on hover
    tiles.forEach(tile => {
      tile.addEventListener('pointerenter', () => {
        tile.classList.add('erased');
      });
    });

    // Reset all tiles
    resetBtn.addEventListener('click', () => {
      tiles.forEach(tile => {
        tile.classList.remove('erased');
      });
    });

    // Recreate grid on resize
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        location.reload();
      }, 300);
    });
  </script>
</body>
</html>
