<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Excuse Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ERROR 404: RESPONSIBILITY NOT FOUND</h1>
            <p class="subtitle">Generate a professional-grade excuse for your technical failures.</p>
        </header>

        <main class="meme-box">
            <div id="excuse-display" class="excuse-text">Click the button to shift the blame...</div>
            <div class="controls">
                <button id="generate-btn" class="primary-btn">GENERATE AGAIN</button>
                <button id="copy-btn" class="secondary-btn">COPY TO CLIPBOARD</button>
            </div>
        </main>

        <footer>
            <p>Built with ☕ and desperation</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
